version: '3.8'

services:
  # Mosquitto MQTT Broker: No changes needed here.
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped

  # Renamed 'timescaledb' to 'db' for consistency
  db:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_USER: postgres
      POSTGRES_DB: drone_telemetry
    ports:
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data # Added a volume to persist data

  # Backend Service: Corrected dependency and environment variable
  backend:
    build: ./backend
    depends_on:
      - mosquitto
      - db # Corrected dependency to match the service name 'db'
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: drone/+/telemetry
      POSTGRES_HOST: db # Corrected to match the service name 'db'
      POSTGRES_PORT: 5432
      POSTGRES_DB: drone_telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      LOG_LEVEL: INFO
      STALE_AFTER_SEC: 10
      OFFLINE_AFTER_SEC: 30
      INGEST_MAX_CONCURRENCY: 10
      INGEST_BACKLOG_MAX: 100
      EMERGENCY_BATTERY_PCT: 5
      WS_PUSH_HZ: 5
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Simulator Service: Now starts first
  simulator:
    build:
      context: ./mavsdk
      dockerfile: Dockerfile.simulator
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    profiles: ["sim"]  # only for local testing; keep disabled in production
    # No dependency needed, it should start independently

  # MAVSDK Drone Script: Now depends on the simulator
  mavsdk-drone1:
    build:
      context: ./mavsdk
      dockerfile: Dockerfile.mavsdk
    # This service now correctly depends on the simulator being ready
    depends_on:
      - mosquitto
      - simulator
    command: "--port 14540 --drone-id DRONE1 --mqtt-host mosquitto --simulator-host simulator"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    profiles: ["sim"]  # ensure it does not bind 14540 in production

# Define the volume for PostgreSQL data persistence
volumes:
  postgres_data: