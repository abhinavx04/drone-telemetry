version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_PASSWORD: example
      POSTGRES_USER: postgres
      POSTGRES_DB: drone_telemetry
    ports:
      - "5432:5432"
    restart: unless-stopped

  backend:
    build: ./backend
    depends_on:
      - mosquitto
      - timescaledb
    environment:
      MQTT_HOST: mosquitto
      MQTT_PORT: 1883
      MQTT_TOPIC: drone/+/telemetry
      POSTGRES_HOST: timescaledb
      POSTGRES_PORT: 5432
      POSTGRES_DB: drone_telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: example
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    restart: unless-stopped

  mavsdk-drone1:
    build:
      context: ./mavsdk
      dockerfile: Dockerfile.mavsdk # Use the dedicated Dockerfile
    command: "--port 14540 --drone-id DRONE1 --mqtt-host mosquitto"
    depends_on:
      - mosquitto
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped

  simulator:
    build:
      context: ./mavsdk
      dockerfile: Dockerfile.simulator # Use the dedicated Dockerfile
    depends_on:
      - mavsdk-drone1
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped